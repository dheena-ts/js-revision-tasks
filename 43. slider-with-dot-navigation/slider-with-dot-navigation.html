<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider with Dots Navigation</title>
    <link rel="stylesheet" href="./slider-with-dot-navigation.css">
</head>
<body>
    <div class="slide-container">

        <div class="slideImg">
            <img src="https://static.vecteezy.com/system/resources/previews/053/285/774/non_2x/high-resolution-flower-macro-with-stunning-bokeh-for-picture-perfect-stock-images-free-photo.jpg" alt="" style="width:30%">
        </div>

        <div class="slideImg">
            <img src="https://static.vecteezy.com/system/resources/previews/055/573/255/non_2x/beautiful-shot-of-rocky-mountains-covered-with-white-snow-high-resolution-image-1-free-photo.jpg" alt="" style="width:30%">
        </div>

        <div class="slideImg">
            <img src="https://static.vecteezy.com/system/resources/previews/041/166/062/non_2x/ai-generated-hawk-high-quality-image-free-photo.jpg" alt="" style="width:30%">
        </div>

    </div>

    <div class="dotNavigation">
        <span class="dot" onclick="sliderNavigation(1)"></span>
        <span class="dot" onclick="sliderNavigation(2)"></span>
        <span class="dot" onclick="sliderNavigation(3)"></span>
    </div>

    <script src="./slider-with-dot-navigation.js"></script>
</body>
</html>
