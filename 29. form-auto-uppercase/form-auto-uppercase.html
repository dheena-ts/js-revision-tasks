<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Auto Uppercase</title>
    <link rel="stylesheet" href="./form-auto-uppercase.css">
</head>

<body>
    <div class="container">
        <label for="">Enter a input</label>
        <input type="text" id="userInput" onkeyup="this.value = this.value.toUpperCase();">
    </div>

    <script src="./form-auto-uppercase.js"></script>
</body>

</html>
