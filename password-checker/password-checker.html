<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="./password-checker.css">
</head>
<body>
    <label for="">Enter password: </label>
    <input type="password" id="password">

    <div id="errorDiv"></div>

    <div id="strengthIndicator">Strength Indicator: <span id="strength"></span></div>

    <div>Password must contain:</div>
        <ul id="checklist">
            <li id="len" class="invalid">Minimum 8 characters</li>
            <li id="up" class="invalid">At least one uppercase letter</li>
            <li id="low" class="invalid">At least one lowercase letter</li>
            <li id="num" class="invalid">At least one number</li>
            <li id="special" class="invalid">At least one special character</li>
        </ul>

    <script src="./password-checker.js"></script>
</body>
</html>
