<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table Row Add</title>
    <link rel="stylesheet" href="./dynamic-table-row-add.css">
</head>

<body>

    <div class="container">
        <label for="">Enter name: </label>
        <input type="text" placeholder="Name" id="name">

        <label for="">Enter age: </label>
        <input type="text" placeholder="Age" id="age">

        <button onclick="addRow()">Add</button>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="./dynamic-table-row-add.js"></script>
</body>

</html>
