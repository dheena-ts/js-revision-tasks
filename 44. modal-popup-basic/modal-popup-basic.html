<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup (Basic)</title>
    <link rel="stylesheet" href="./modal-popup-basic.css">
</head>
<body>
    <h3>Modal popup</h3>

    <button id="modalBtn">Open modal</button>

    <div id="modalDiv" class="modal">
        <div class="modalContent">
            <span class="close">&times;</span>
            <p>This is modal</p>
        </div>
    </div>
    <script src="./modal-popup-basic.js"></script>
</body>
</html>
