<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage Form Auto Save</title>
    <link rel="stylesheet" href="./local-storage-form-auto-save.css">
</head>

<body>

    <form id="myForm">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <br>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email">
            <div id="errorDiv"></div>
        </div>
        <br>
        <div>
            <label for="message">Message:</label>
            <textarea id="message" rows="4" placeholder="Enter message"></textarea>
        </div>
        <br>
        <button type="submit">Submit</button>
        <button type="button" id="clearStorage">Clear Data</button>
    </form>
    <script src="./local-storage-form-auto-save.js"></script>
</body>

</html>
